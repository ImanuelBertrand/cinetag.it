# CineTagIt Configuration Example
# Copy this file to config.yaml and fill in your own values

# TMDB API Token - Get this from https://www.themoviedb.org/settings/api
TMDB_API_TOKEN: your_tmdb_api_token_here

# JWT Configuration
JWT_COOKIE_DOMAIN: localhost
JWT_SESSION_COOKIE: False
JWT_ACCESS_TOKEN_EXPIRES: 3600  # 1 hour
JWT_REFRESH_TOKEN_EXPIRES: 15552000  # 180 days
JWT_SECRET_KEY: your_jwt_secret_key_here  # Use a strong random value

# Server Configuration
SERVER_NAME: localhost:5000  # Format: domain[:port]
SECRET_KEY: your_secret_key_here  # Use a strong random value

# Mail Configuration
MAIL_DEFAULT_SENDER: example@cinetag.it
MAIL_DEFAULT_SENDER_NAME: Cine Tag It
MAIL_SERVER: smtp.example.com
MAIL_PORT: 587
MAIL_USE_TLS: True
MAIL_USERNAME: your_mail_username_here
MAIL_PASSWORD: your_mail_password_here

# Database Configuration
SQLALCHEMY_DATABASE_URI: mysql+pymysql://username:password@localhost/database_name

# Cache Configuration
CACHE_KEY_PREFIX: cinetag
CACHE_TYPE: flask_caching.backends.rediscache.RedisCache
CACHE_REDIS_URL: redis://localhost:6379/0

# Additional JWT Configuration
JWT_TOKEN_LOCATION: ["headers", "cookies"]
JWT_ACCESS_COOKIE_NAME: access_token_cookie
JWT_ACCESS_COOKIE_PATH: /
JWT_COOKIE_CSRF_PROTECT: True
JWT_REFRESH_COOKIE_PATH: /
JWT_ACCESS_CSRF_HEADER_NAME: X-CSRF-TOKEN
JWT_CSRF_CHECK_FORM: True

# SQLAlchemy Configuration
SQLALCHEMY_TRACK_MODIFICATIONS: False

# Application Settings
COUNT_TOP_SELECT_OPTION: 5
DEFAULT_REGION: US
DEFAULT_LANGUAGE: en
TMDB_IMAGE_BASE_URL: https://image.tmdb.org/t/p/original/

# Environment-specific Settings
# For development environments:
JWT_COOKIE_SECURE: True  # Set to False in development environments
DEBUG: False  # Set to True in development environments
