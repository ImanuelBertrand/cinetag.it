{% extends "base.html" %}

{% block title %}Profile{% endblock %}

{% block content %}
    <h1>Profile</h1>
    <form method="POST" action="{{ url_for('html.profile') }}" accept-charset="UTF-8" enctype="application/x-www-form-urlencoded">
        <input type="hidden" name="csrf_token">
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" value="{{ user.name }}" required>
        <br>
        <label for="language">Language:</label>
        <select id="language" name="language" required>
            {% for lang in ['de', 'en', 'fr', 'ru', 'uk', 'lt', 'lv'] %}
                <option value="{{ lang }}" {% if lang == user.language %}selected{% endif %}>{{ lang }}</option>
            {% endfor %}
        </select>
        <br>
        <label for="region">Region:</label>
        <select id="region" name="region" required>
            {% for region in ['DE', 'US', 'FR', 'LT', 'UA', 'LV'] %}
                <option value="{{ region }}" {% if region == user.region %}selected{% endif %}>{{ region }}</option>
            {% endfor %}
        </select>
        <button type="submit">Update</button>
    </form>
{% endblock %}
