{% extends "_base.html" %}

{% block title %}Releases{% endblock %}

{% block content %}
<h2>Releases</h2>
<ul class="release-list">
    {% for release in releases %}
        <li class="{{ release.decision }}"><a href="{{ release.url }}">{{ release.start_pretty }}:&emsp;{{ release.title }}</a></li>
    {% endfor %}
</ul>
{% endblock %}
