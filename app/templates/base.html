<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Cinema Date Management Tool{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
    <header>
        <nav>
            <a href="{{ url_for('html.home') }}">Home</a>
            {% if not current_user.is_authenticated %}
                <a href="{{ url_for('html.login') }}">Login</a>
                <a href="{{ url_for('html.register') }}">Register</a>
            {% else %}
                <a href="{{ url_for('html.profile') }}">Profile</a>
                <form action="{{ url_for('html.logout') }}" method="post" style="display: inline;">
                    <button type="submit">Logout</button>
                </form>
            {% endif %}
        </nav>
    </header>
    <main>
        {% block content %}{% endblock %}
    </main>
    <footer>

    </footer>
</body>
</html>
