{% extends "_base.html" %}

{% block title %}Login{% endblock %}

{% block content %}
    <h2>Login</h2>
    <form method="POST" action="{{ url_for('html.login') }}">
        <input type="hidden" name="csrf_token">
        <div class="form-row">
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>
        </div>
        <div class="form-row">
            <label for="password">Password:</label>
            <input type="password" id="password" name="password" required>
        </div>
        <div class="form-row">
            <button type="submit">Login</button>
        </div>
    </form>
    <p>Don't have an account? <a href="{{ url_for('html.register') }}">Register</a></p>
    <p>Forgot your password? <a href="{{ url_for('html.reset_password_request') }}">Reset Password</a></p>
{% endblock %}
