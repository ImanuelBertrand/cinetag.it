<nav>
    <a href="{{ url_for('html.get_movies', filter_mode="all") }}">All movies</a>
    {% if current_user %}
        <div class="dropdown hoverable">
            <a href="#" class="dropbtn">My movies</a>
            <div class="dropdown-content">
                <a href="{{ url_for('html.get_movies', filter_mode="pending") }}">❔ Not yet tagged</a>
                <a href="{{ url_for('html.get_movies', filter_mode="approved") }}">👍️ Must see</a>
                <a href="{{ url_for('html.get_movies', filter_mode="maybe") }}">🤷 Maybe</a>
                <a href="{{ url_for('html.get_movies', filter_mode="disapproved") }}">👎 Definitely not</a>
            </div>
        </div>
        <div class="dropdown hoverable">
            <a href="#" class="dropbtn">My releases</a>
            <div class="dropdown-content">
                {% if current_user %}
                    <a href="{{ url_for('html.get_user_release_dates') }}">As a list</a>
                    <a href="{{ url_for('html.get_user_calendar') }}">As a calendar</a>
                {% endif %}
            </div>
        </div>
        <a href="{{ url_for('html.profile') }}">Profile</a>
