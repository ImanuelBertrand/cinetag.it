{% extends "_base.html" %}

{% block title %}Movie Details{% endblock %}

{% block content %}
    <h2>{{ movie.title }}</h2>
    <img src="https://image.tmdb.org/t/p/w500/{{ movie.poster_path }}"
         alt="{{ movie.title }}" style="float: left; margin:0 1em 1em 0;"/>
    <p>{{ movie["overview"] }}</p>
    <p>Release Date: {{ movie["release_date"] }}</p>
{% endblock %}
