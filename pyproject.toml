[tool.ruff]
line-length = 88
target-version = "py310"
exclude = [
  ".git",
  "__pycache__",
  "venv_*",
]

[tool.ruff.lint]
select = [
  "B",      # flake8-bugbear
  "E",      # Error
  "W",      # Warning
  "F",      # Pyflakes
  "UP",     # pyupgrade
  "SIM222", # expr-or-true
  "S",      # flake8-bandit
]
extend-ignore = [
  "UP031", # printf-string-formatting (high-effort fix)
  "UP008", # super-call-with-parameters (high-effort fix)
  "UP037", # Remove quotes from type annotation (not worth it, leads to inconsistent code)
]

per-file-ignores = { "test_*" = ["S101"] }

[tool.ruff.format]
