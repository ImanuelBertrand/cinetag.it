[tool.ruff]
line-length = 88
target-version = "py310"
exclude = [
  ".git",
  "__pycache__",
  "venv_*",
]

[tool.ruff.lint]
select = [
  "E",   # Error
  "W",   # Warnin
  "B",   # flake8-bugbear
  "C4",  # flake8-comprehensions
# "C90", # mccabe # TODO
  "F",   # Pyflakes
# "G",   # flake8-logging-format # TODO
  "I",   # isort
  "PIE", # flake8-pie
  "UP",  # pyupgrade
  "RET", # flake8-return
  "RUF", # flake8-return
  "S",   # flake8-bandit
  "SIM", # flake8-simplify
  "TC",  # flake8-type-checking
  "TID", # flake8-tidy-imports
]
extend-ignore = [
  "UP031", # printf-string-formatting (high-effort fix)
  "UP008", # super-call-with-parameters (high-effort fix)
  "UP037", # Remove quotes from type annotation (not worth it, leads to inconsistent code)
]

per-file-ignores = { "test_*" = ["S101"] }

[tool.ruff.format]
