services:
  db:
    volumes:
      - ./docker/postgres/init-test-db.sh:/docker-entrypoint-initdb.d/init-test-db.sh:ro

  squid:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: squid
    volumes:
      - ./docker/squid/squid-dev.conf:/etc/squid/squid.conf:ro

  nginx:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: nginx
      network: host

  mailhog:
    image: mailhog/mailhog:latest
    container_name: cinetagit_mailhog
    ports:
      - "1025:1025" # SMTP port
      - "8025:8025" # Web UI port
    networks:
      - cinetagit_network

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: development
      network: host
    volumes:
      - .:/app
      - ./docker/.claude.json:/home/appuser/.claude.json
      - ./docker/.claude/:/home/appuser/.claude/
      - claude_local:/home/appuser/.local
    environment:
      - MAIL_SERVER=mailhog
      - MAIL_PORT=1025
      - MAIL_USE_TLS=false
      - MAIL_USE_SSL=false
      - SERVER_NAME=${SERVER_NAME:-localhost:8000}
      - PREFERRED_URL_SCHEME=${PREFERRED_URL_SCHEME:-http}
      - MAIL_DEFAULT_SENDER=${MAIL_DEFAULT_SENDER:-noreply@cinetag.it}
      - NO_PROXY=db,redis,nginx,mailhog,localhost,127.0.0.1
    depends_on:
      - mailhog

volumes:
  claude_local:
