name: Code Quality

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Ruff check
        uses: astral-sh/ruff-action@v3
        with:
          version: latest
          args: check . --output-format=github

      - name: Ruff format (check only)
        uses: astral-sh/ruff-action@v3
        with:
          version: latest
          args: format --check .

  prettier:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Prettier check
        run: npx prettier --check .

  pytest:
    runs-on: ubuntu-latest
    needs: [ruff, prettier] # Don't waste action minutes if the other checks fail
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: "pyproject.toml"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Copy test config
        run: cp .devcontainer/docker-config.yaml app/config.yaml

      - name: Run tests
        run: uv run pytest
