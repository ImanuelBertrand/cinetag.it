name: "Copilot Setup Steps"

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          lfs: true

      - name: Install uv
        uses: astral-sh/setup-uv@f98e06938123ccabd21905ea5d0069192241f9f1 # v8.3.1
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version-file: "pyproject.toml"

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install JavaScript dependencies
        run: npm ci

      - name: Install Python dependencies
        run: uv sync --frozen

      - name: Build assets
        env:
          FLASK_APP: "app.create_app:create_app('development')"
          DATABASE_URI: "postgresql://localhost/cinetag_db"
        run: |
          uv run flask build-assets
          mkdir -p app/static/vendor/fullcalendar
          cp node_modules/fullcalendar/index.global.min.js app/static/vendor/fullcalendar/
          cp -r node_modules/@fullcalendar/core/locales app/static/vendor/fullcalendar/
