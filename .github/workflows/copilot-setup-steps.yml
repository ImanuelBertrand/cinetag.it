name: "Copilot Setup Steps"

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          lfs: true

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version-file: "pyproject.toml"

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install JavaScript dependencies
        run: npm ci

      - name: Install Python dependencies
        run: uv sync --frozen

      - name: Build assets
        env:
          FLASK_APP: "app.create_app:create_app('development')"
          DATABASE_URI: "postgresql://localhost/cinetag_db"
        run: |
          uv run flask build-assets
          mkdir -p app/static/vendor/fullcalendar
          cp node_modules/fullcalendar/index.global.min.js app/static/vendor/fullcalendar/
          cp -r node_modules/@fullcalendar/core/locales app/static/vendor/fullcalendar/
