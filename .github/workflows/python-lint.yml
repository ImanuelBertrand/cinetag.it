name: python-lint

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Ruff check
        uses: astral-sh/ruff-action@v3
        with:
          version: latest
          args: check . --output-format=github

      - name: Ruff format (check only)
        uses: astral-sh/ruff-action@v3
        with:
          version: latest
          args: format --check .