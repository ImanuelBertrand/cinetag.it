version: '3.8'

services:
  app:
    container_name: cinetagit-dev-env
    build:
      context: ..
      dockerfile: devenv/Dockerfile
    ports:
      - "5000:5000"
    volumes:
      - ..:/app
      - app_logs:/app/app/logs
      - app_storage:/app/storage
    environment:
      - FLASK_ENV=development
      - CONFIG_FILE=/app/devenv/docker-config.yaml
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      mailhog:
        condition: service_started

  db:
    container_name: cinetagit-db
    image: mariadb:11
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=rootpassword
      - MYSQL_DATABASE=cinetagit
      - MYSQL_USER=cinetagit
      - MYSQL_PASSWORD=password
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mariadb", "-h", "localhost", "-u", "cinetagit", "-ppassword", "cinetagit", "-e", "SELECT 1"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    container_name: cinetagit-redis
    image: redis:6.2-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  mailhog:
    container_name: cinetagit-mailhog
    image: mailhog/mailhog
    ports:
      - "8025:8025"  # Web UI
      - "1025:1025"  # SMTP server

volumes:
  db_data:
  redis_data:
  app_logs:
  app_storage:
