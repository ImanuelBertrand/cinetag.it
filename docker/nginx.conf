events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    server_tokens off;

    sendfile        on;
    keepalive_timeout  65;

    # Gzip configuration
    gzip on;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Poster format negotiation: pick the best next-gen variant the browser
    # advertised in its Accept header (AVIF first, then WebP), else the original
    # (empty suffix). Kept in sync with POSTER_FORMATS in image_service.py.
    map $http_accept $poster_ext {
        default       "";
        "~image/avif" ".avif";
        "~image/webp" ".webp";
    }

    server {
        listen 80;
        server_name localhost;

        # 1. Standard Static Files (CSS, JS, Favicon)
        location /static/ {
            alias /usr/share/nginx/html/static/;
            expires 30d;
            add_header Cache-Control "public, no-transform";
            # These files are served directly by nginx and never pass through
            # Flask's after_request header hook, so set nosniff here too.
            add_header X-Content-Type-Options "nosniff" always;
        }

        # 2. Optimized Poster Logic (The "Check Disk First" Pattern)
        # Try the Accept-negotiated variant first; on a cold miss Flask
        # generates it (reading the same Accept header) and returns it via
        # X-Accel-Redirect. Explicit types so directly-served .webp/.avif files
        # get the right Content-Type regardless of the base mime.types.
        location ~* ^/poster/(?<width>\d+)/(?<filename>.+)$ {
            root /usr/share/nginx/html/posters/;
            types {
                image/jpeg jpg jpeg;
                image/png  png;
                image/gif  gif;
                image/webp webp;
                image/avif avif;
            }
            default_type application/octet-stream;
            try_files /w$width/$filename$poster_ext @flask_fallback;
            add_header Vary Accept;
            # Posters are immutable: the TMDB filename is content-addressed, so a
            # given /poster/{width}/{filename} URL never changes bytes (a changed
            # poster gets a new filename). Cache hard so browsers stop revalidating.
            add_header Cache-Control "public, max-age=31536000, immutable" always;
            add_header X-Content-Type-Options "nosniff" always;
        }

        # 3. Internal Redirect (X-Accel-Redirect)
        # This location is hidden from the outside world
        location /internal-static/ {
            internal;
            alias /usr/share/nginx/html/posters/;
            # Same immutable poster bytes as location 2 — the cold-miss path that
            # Flask hands back must carry the same long-lived cache headers.
            add_header Cache-Control "public, max-age=31536000, immutable" always;
            add_header X-Content-Type-Options "nosniff" always;
        }

        # 4. The Flask Proxy Fallback
        location @flask_fallback {
            proxy_pass http://web:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 5. Default Proxy for everything else
        location / {
            proxy_pass http://web:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Important for file uploads and long-running requests
            proxy_read_timeout 90;
            proxy_connect_timeout 90;
            proxy_send_timeout 90;
            client_max_body_size 20M;
        }
    }
}
