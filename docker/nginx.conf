events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    server_tokens off;

    sendfile        on;
    keepalive_timeout  65;

    # Gzip configuration
    gzip on;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    server {
        listen 80;
        server_name localhost;

        # 1. Standard Static Files (CSS, JS, Favicon)
        location /static/ {
            alias /usr/share/nginx/html/static/;
            expires 30d;
            add_header Cache-Control "public, no-transform";
        }

        # 2. Optimized Poster Logic (The "Check Disk First" Pattern)
        location ~* ^/poster/(?<width>\d+)/(?<filename>.+)$ {
            root /usr/share/nginx/html/posters/;
            try_files /w$width/$filename @flask_fallback;
        }

        # 3. Internal Redirect (X-Accel-Redirect)
        # This location is hidden from the outside world
        location /internal-static/ {
            internal;
            alias /usr/share/nginx/html/posters/;
        }

        # 4. The Flask Proxy Fallback
        location @flask_fallback {
            proxy_pass http://web:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 5. Default Proxy for everything else
        location / {
            proxy_pass http://web:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Important for file uploads and long-running requests
            proxy_read_timeout 90;
            proxy_connect_timeout 90;
            proxy_send_timeout 90;
            client_max_body_size 20M;
        }
    }
}
