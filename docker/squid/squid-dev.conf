# Allowlisted destinations
acl allowed_domains dstdomain .themoviedb.org
acl allowed_domains dstdomain .tmdb.org
acl allowed_domains dstdomain .googleapis.com
acl allowed_domains dstdomain .push.services.mozilla.com
acl allowed_domains dstdomain api.push.apple.com
acl allowed_domains dstdomain .notify.windows.com
acl allowed_domains dstdomain .anthropic.com
acl allowed_domains dstdomain .claude.ai
acl allowed_domains dstdomain .claude.com

# Standard ports
acl SSL_ports port 443
acl Safe_ports port 80
acl Safe_ports port 443
acl CONNECT method CONNECT

# Deny requests to unknown ports
http_access deny !Safe_ports
http_access deny CONNECT !SSL_ports

# Allow cache manager from localhost (used by healthcheck)
http_access allow manager localhost
http_access deny manager

# Allow whitelisted domains, deny everything else
http_access allow allowed_domains
http_access deny all

# Disable disk cache — this proxy is for traffic control only
cache deny all

# Proxy listening port
http_port 3128
